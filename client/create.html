<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Naruto — Створення персонажа</title>
  <style>
    :root{ --bg:#0b0f14; --card:#121824; --text:#e9eef6; --muted:#98a3b3; --acc:#ffb02e; --line:rgba(255,255,255,.10); }
    *{box-sizing:border-box}
    body{margin:0; font-family:system-ui,Segoe UI,Roboto,Arial; background:radial-gradient(1200px 600px at 40% 10%,rgba(255,176,46,.18),transparent 60%), var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
    .wrap{width:min(980px,100%); background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02)); border:1px solid var(--line); border-radius:18px; padding:18px; box-shadow:0 16px 40px rgba(0,0,0,.35)}
    .top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px}
    h1{margin:0; font-size:22px}
    .muted{color:var(--muted); font-size:13px}
    .grid{display:grid; grid-template-columns: repeat(3, 1fr); gap:12px; margin-top:14px}
    .card{border:1px solid var(--line); border-radius:16px; background:rgba(0,0,0,.22); padding:14px; cursor:pointer; min-height:130px; position:relative}
    .card.active{border-color:rgba(255,176,46,.55); box-shadow:0 0 0 3px rgba(255,176,46,.12) inset}
    .tag{display:inline-block; padding:6px 10px; border-radius:999px; border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--muted); font-size:12px}
    .card h3{margin:10px 0 6px}
    .card p{margin:0; color:var(--muted); font-size:13px; line-height:1.35}
    .row{display:flex; gap:10px; align-items:center; margin-top:14px; flex-wrap:wrap}
    .toggle{display:flex; border:1px solid var(--line); border-radius:12px; overflow:hidden}
    .toggle button{padding:10px 12px; border:0; background:transparent; color:var(--text); cursor:pointer; font-weight:800}
    .toggle button.active{background:rgba(255,176,46,.18)}
    input{flex:1; min-width:240px; padding:12px 12px; border-radius:12px; border:1px solid var(--line); background:rgba(0,0,0,.25); color:var(--text); outline:none}
    input:focus{border-color:rgba(255,176,46,.65)}
    .btn{padding:12px 12px; border-radius:12px; border:0; background:var(--acc); color:#1b1205; cursor:pointer; font-weight:900}
    .btn.secondary{background:transparent; color:var(--text); border:1px solid var(--line)}
    .note{margin-top:10px; color:var(--muted); font-size:13px; white-space:pre-wrap}
    .err{color:#ff9f9f}
    @media (max-width: 860px){ .grid{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Створення персонажа</h1>
        <div class="muted">Оберіть клас, стать та нік (або 🎲 рандом).</div>
        <div class="muted" id="serverLine" style="margin-top:6px"></div>
      </div>
      <button class="btn secondary" id="backBtn">← Сервери</button>
    </div>

    <div class="grid" id="classGrid"></div>

    <div class="row">
      <div class="toggle">
        <button id="maleBtn" class="active">Чоловік</button>
        <button id="femaleBtn">Жінка</button>
      </div>

      <input id="nickInput" placeholder="Введіть нік" />
      <button class="btn secondary" id="randBtn">🎲 Рандом</button>
      <button class="btn" id="createBtn">Підтвердити</button>
    </div>

    <div class="note" id="note"></div>
  </div>

<script>
  const userId = localStorage.getItem('userId');
  const serverId = localStorage.getItem('serverId');
  if(!userId) location.href = '/';
  if(!serverId) location.href = '/servers.html';
  document.getElementById('serverLine').textContent = `Сервер: ${serverId}`;

  document.getElementById('backBtn').onclick = ()=> location.href='/servers.html';

  const classes = [
    { id:'ninjutsu', title:'Ніндзютсу', desc:'Акцент на стратег. атаку та контроль.' },
    { id:'taijutsu', title:'Тайдзютсу', desc:'Акцент на фіз. атаку та швидкість.' },
    { id:'genjutsu', title:'Гензютсу', desc:'Стратегічний стиль (дебафи/контроль).' },
  ];

  let selected = 'taijutsu';
  let gender = 'male';

  const grid = document.getElementById('classGrid');
  function renderCards(){
    grid.innerHTML='';
    for(const c of classes){
      const el = document.createElement('div');
      el.className = 'card' + (c.id===selected ? ' active':'');
      el.innerHTML = `
        <span class="tag">Клас</span>
        <h3>${c.title}</h3>
        <p>${c.desc}</p>
        <div style="position:absolute;bottom:12px;left:14px;right:14px;color:var(--muted);font-size:12px;">Натисни щоб обрати</div>
      `;
      el.onclick = ()=>{ selected=c.id; renderCards(); };
      grid.appendChild(el);
    }
  }
  renderCards();

  const maleBtn = document.getElementById('maleBtn');
  const femaleBtn = document.getElementById('femaleBtn');
  maleBtn.onclick = ()=>{ gender='male'; maleBtn.classList.add('active'); femaleBtn.classList.remove('active'); };
  femaleBtn.onclick = ()=>{ gender='female'; femaleBtn.classList.add('active'); maleBtn.classList.remove('active'); };

  const nickInput = document.getElementById('nickInput');
  nickInput.value = genNick();

  document.getElementById('randBtn').onclick = ()=> nickInput.value = genNick();

  function genNick(){
    const a = ['Shadow','Fire','Leaf','Wind','Storm','Iron','Wolf','Fox','Raven','Tiger'];
    const b = ['Ninja','Shinobi','Kage','Kunai','Chakra','Blade','Sensei','Ghost','Hunter','Sage'];
    const x = a[Math.floor(Math.random()*a.length)];
    const y = b[Math.floor(Math.random()*b.length)];
    const n = Math.floor(100+Math.random()*900);
    return `${x}${y}${n}`;
  }

  async function safeJson(res){
    const ct = res.headers.get('content-type')||'';
    if(ct.includes('application/json')) return await res.json();
    return { ok:false, error:'Non-JSON response', details:(await res.text()).slice(0,300) };
  }

  document.getElementById('createBtn').onclick = async ()=>{
    const note = document.getElementById('note');
    note.classList.remove('err');

    const nickname = (nickInput.value||'').trim();
    if(!nickname){ note.classList.add('err'); note.textContent='❌ Введи нік'; return; }

    note.textContent='Створюю персонажа...';

    const res = await fetch('/api/auth/createCharacter',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ userId, type:selected, gender, nickname })
    }).catch(()=>null);

    if(!res){ note.classList.add('err'); note.textContent='❌ Network error'; return; }
    const data = await safeJson(res);

    if(!res.ok || !data?.ok){
      note.classList.add('err');
      note.textContent = `❌ ${data?.error || 'Помилка'}`;
      return;
    }

    localStorage.setItem('playerId', data.user.playerId);
    note.textContent='✅ Готово! Заходжу в Village...';
    setTimeout(()=>location.href='/village.html', 250);
  };
</script>
</body>
</html>
